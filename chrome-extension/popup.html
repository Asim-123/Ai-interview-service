<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Interview Copilot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 350px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      color: #ffffff;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 15px;
      background: linear-gradient(90deg, #00ffff, #bf00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .status {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #666;
    }

    .status-dot.connected {
      background: #00ff00;
      box-shadow: 0 0 10px #00ff00;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .input-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #999;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #00ffff;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(90deg, #00ffff, #bf00ff);
      color: #000;
    }

    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      margin-top: 10px;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .info {
      font-size: 11px;
      color: #666;
      margin-top: 15px;
      text-align: center;
      line-height: 1.4;
    }

    .success-message {
      padding: 10px;
      background: rgba(0, 255, 0, 0.1);
      border: 1px solid rgba(0, 255, 0, 0.3);
      border-radius: 6px;
      color: #00ff00;
      font-size: 12px;
      margin-bottom: 15px;
      display: none;
    }

    .error-message {
      padding: 10px;
      background: rgba(255, 0, 0, 0.1);
      border: 1px solid rgba(255, 0, 0, 0.3);
      border-radius: 6px;
      color: #ff4444;
      font-size: 12px;
      margin-bottom: 15px;
      display: none;
    }
  </style>
</head>
<body>
  <h1>AI Interview Copilot</h1>

  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Not Connected</span>
  </div>

  <div class="success-message" id="successMessage"></div>
  <div class="error-message" id="errorMessage"></div>

  <div class="input-group">
    <label for="apiUrl">API URL</label>
    <input type="text" id="apiUrl" placeholder="http://localhost:3000" />
  </div>

  <div class="input-group">
    <label for="userToken">Firebase Token</label>
    <input type="password" id="userToken" placeholder="Paste your token from the app" />
  </div>

  <button class="btn-primary" id="connectBtn">Connect Extension</button>
  
  <button class="btn-secondary" id="openAppBtn">Open Web App</button>

  <div class="info">
    Get your token from the web app settings. The extension will automatically detect questions in Google Meet, Zoom, and Teams.
  </div>

  <script src="popup.js"></script>
</body>
</html>
